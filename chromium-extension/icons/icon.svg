<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Red rounded square background -->
  <rect width="128" height="128" rx="20" fill="#c1392b"/>
  <!-- Speech bubble body -->
  <rect x="18" y="22" width="92" height="62" rx="14" fill="white"/>
  <!-- Speech bubble tail -->
  <polygon points="34,84 54,84 38,102" fill="white"/>
  <!-- Opening double curly quotes &#x201C; &#x201D; -->
  <text x="60" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="64"
        font-weight="bold" fill="#c1392b" text-anchor="middle">&#x201C;&#x201D;</text>
</svg>
