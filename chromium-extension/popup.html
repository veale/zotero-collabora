<!DOCTYPE html>
<html>
<head>
<style>
body {
  width: 220px;
  margin: 0;
  padding: 8px 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
}
button {
  display: block;
  width: 100%;
  padding: 8px 16px;
  border: none;
  background: none;
  text-align: left;
  cursor: pointer;
  color: #333;
}
button:hover {
  background: #f0f0f0;
}
hr {
  border: none;
  border-top: 1px solid #e0e0e0;
  margin: 4px 0;
}
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  color: #555;
  font-size: 12px;
}
.toggle-row label {
  cursor: pointer;
}
.switch {
  position: relative;
  width: 34px;
  height: 18px;
  flex-shrink: 0;
  margin-left: 8px;
}
.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.slider {
  position: absolute;
  inset: 0;
  background: #ccc;
  border-radius: 18px;
  transition: background 0.2s;
  cursor: pointer;
}
.slider::before {
  content: "";
  position: absolute;
  height: 14px;
  width: 14px;
  left: 2px;
  bottom: 2px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.switch input:checked + .slider {
  background: #c1392b;
}
.switch input:checked + .slider::before {
  transform: translateX(16px);
}
</style>
</head>
<body>
<button data-command="addEditCitation">Add Citation</button>
<button data-command="addEditBibliography">Bibliography</button>
<button data-command="refresh">Refresh</button>
<hr>
<button data-command="setDocPrefs">Document Preferences</button>
<button data-command="addNote">Add Note</button>
<hr>
<button data-command="removeCodes">Unlink Citations</button>
<button data-command="exportCitations">Export Citations</button>
<hr>
<button id="force-cancel" style="color:#c1121f">Force Cancel</button>
<hr>
<div class="toggle-row">
  <label for="toolbar-toggle">Toolbar buttons</label>
  <span class="switch">
    <input type="checkbox" id="toolbar-toggle" checked>
    <span class="slider"></span>
  </span>
</div>
<script src="popup.js"></script>
</body>
</html>
